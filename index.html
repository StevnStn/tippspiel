<!DOCTYPE html> 
<html lang="de"> 
<head> 
    <meta charset="UTF-8"> 
    <title>WM 2026 Tippspiel</title> 
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        .match-input { border: 1px solid #ccc; padding: 15px; border-radius: 8px; max-width: 400px; }
        #ausgabe { margin-top: 20px; padding: 10px; background: #f4f4f4; border-radius: 5px; }
    </style>
</head> 
<body> 

    <h1>🏆 WM 2026 Tippspiel</h1> 
    
    <div class="match-input">
        <label>Dein Name:</label><br>
        <input type="text" id="name" placeholder="z.B. Max"><br><br> 

<label>Paarung auswählen:</label><br>
<select id="matchSelection">
    <option value="Deutschland vs. USA">Achtelfinale 1: Deutschland vs. USA (Beispiel)</option>
    <option value="Spanien vs. Brasilien">Achtelfinale 2: Spanien vs. Brasilien (Beispiel)</option>
    <option value="Argentinien vs. Frankreich">Achtelfinale 3: Argentinien vs. Frankreich (Beispiel)</option>
    <option value="England vs. Italien">Achtelfinale 4: England vs. Italien (Beispiel)</option>
</select>
<br><br>

<label>Tore Team A:</label> 
<input type="number" id="toreA" min="0" value="0">
<span> : </span>
<input type="number" id="toreB" min="0" value="0">
<label>Tore Team B</label>
<br><br>

        <button onclick="speichern()">Tipp speichern</button> 
        <button onclick="laden()">Tipps aktualisieren</button> 
    </div>

    <h2>Gespeicherte Tipps</h2> 
    <div id="ausgabe">Lade Tipps...</div> 

    <script type="module"> 
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2"; 

        const supabaseUrl = "https://rsbhmetomjrqifzbqvyc.supabase.co"; 
        const supabaseKey = "sb_publishable_ldNwvpKpJ3mO0GdMcJaCnw_LGSKwDTK"; 
        const supabase = createClient(supabaseUrl, supabaseKey);  

        async function speichern() { 
        const name = document.getElementById("name").value; 
        const matchValue = document.getElementById("matchSelection").value; // "Deutschland vs. USA"
    
        // Team A split (vs) TeamB
        const teams = matchValue.split(" vs. ");
        const teamA = teams[0];
        const teamB = teams[1];

        const toreA = Number(document.getElementById("toreA").value);
        const toreB = Number(document.getElementById("toreB").value); 

        if(!name) { alert("Bitte Namen eingeben!"); return; }

        const { error } = await supabase 
            .from("tipps") 
            .insert([ 
                { 
                    name: name, 
                    team_a: teamA,
                    tore_a: toreA, 
                    team_b: teamB,
                    tore_b: toreB 
                } 
               ]);

            if (error) { 
                document.getElementById("ausgabe").innerHTML = "Fehler beim Speichern: " + error.message; 
                return; 
            } 

            document.getElementById("ausgabe").innerHTML = "Tipp gespeichert!"; 
            await laden(); 
        } 

        async function laden() { 
            const { data, error } = await supabase 
                .from("tipps") 
                .select("*") 
                .order("id", { ascending: false }); //von true auf false damit es oben passiert

            if (error) { 
                document.getElementById("ausgabe").innerHTML = "Fehler beim Laden: " + error.message; 
                return; 
            } 

            if (data.length === 0) {
                document.getElementById("ausgabe").innerHTML = "Noch keine Tipps vorhanden.";
                return;
            }

            let html = "<ul>"; 
            for (let i = 0; i < data.length; i++) { 
                let tipp = data[i]; 
                html += `<li><strong>${tipp.name}</strong> tippt: ${tipp.team_a} ${tipp.tore_a} : ${tipp.tore_b} ${tipp.team_b}</li>`;
            } 
            html += "</ul>";
            document.getElementById("ausgabe").innerHTML = html; 
        } 

       
        window.speichern = speichern; 
        window.laden = laden; 

        
        laden(); 
    </script> 
</body> 
</html>
